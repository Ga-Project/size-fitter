# pnpm 11.x の設定ホーム。単一パッケージのため packages は定義しない。
#
# ネイティブビルドを許可する依存を明示する(供給網の最小許可)。
# unrs-resolver: eslint-config-next のリゾルバ(ネイティブ binding)。
allowBuilds:
  unrs-resolver: true

# 脆弱性監視の waiver(`pnpm audit --audit-level high` 用)。
# CI の dependency-audit は high/critical を hard-fail で遮断する。
# ここに載るのは「既知・既存で、現時点で解消手段が Next 14->15 メジャー更新しかない high」のみ。
# 新規に持ち込まれた high/critical は waive されないため CI を落とす。
# 解消条件: next を 15 系へ更新後、この waiver を全撤去して完全 hard-fail へ移行する。
auditConfig:
  ignoreGhsas:
    # next: i18n 利用時の Middleware/Proxy bypass。解消 = next>=15.5.16
    - GHSA-36qx-fr4f-26g5
    # next: Server Components の DoS(不完全修正のフォローアップ)。解消 = next>=14.2.35 系
    - GHSA-5j59-xgg2-r9c4
    # glob(transitive): glob CLI の -c/--cmd 経由コマンドインジェクション。解消 = glob>=10.5.0(上流依存の更新待ち)
    - GHSA-5j98-mcp5-4vw2
    # next: Server Components の DoS。解消 = next>=15.5.16
    - GHSA-8h8q-6873-q5fj
    # next: WebSocket upgrade 利用アプリでの SSRF。解消 = next>=15.5.16
    - GHSA-c4j6-fc7j-m34r
    # next: insecure RSC 利用時の HTTP リクエストデシリアライズによる DoS。解消 = next>=15.0.8
    - GHSA-h25m-26qc-wcjf
    # next: Server Components の DoS。解消 = next>=14.2.34 系
    - GHSA-mwv6-3258-q52c
    # next: Server Components の DoS。解消 = next>=15.5.15
    - GHSA-q4gf-8mx6-v5v3
