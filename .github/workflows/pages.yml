name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時に 1 デプロイのみ。進行中のランは中断しない（公開を中途半端にしない）。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build (static export -> out/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Build (next build -> static export to out/)
        # プロジェクトページ ga-project.github.io/size-fitter/ で配信するため
        # サブパス basePath=/size-fitter を注入する（_next/static の 404 を防ぐ）。
        env:
          BASE_PATH: /size-fitter
        run: pnpm build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
